<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomáš & Eliška - Svatba 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/presentation.css">
</head>
<body>
    <div class="container">
        <!-- Left side - 3D Scene -->
        <div class="scene-container">
            <!-- Loading indicator (hidden, for programmatic use only - visual loading is 3D) -->
            <div id="loading" style="opacity: 0;"></div>
            <div id="canvas-container"></div>
        </div>

        <!-- Right side - Content (dynamically generated) -->
        <div class="content-container" id="contentContainer">
            <!-- Sections will be generated from scenes.json -->
        </div>
    </div>

    <!-- Progress dots (dynamically generated) -->
    <div class="progress-dots" id="progressDots">
        <!-- Dots will be generated from scenes.json -->
    </div>

    <!-- Import Maps for ES Modules (dev) or bundled JS (prod) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
            "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/presentation.js"></script>
</body>
</html>
