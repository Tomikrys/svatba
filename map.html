        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Playfair Display', Georgia, serif;
            background: #1a1a2e;
            color: #e8e4dc;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #c9a959;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 4px;
        }
        
        .map-widget {
            background: rgba(20, 20, 35, 0.95);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(201, 169, 89, 0.3);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
        }
        .tab {
            flex: 1;
            padding: 16px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab:hover { 
            color: #c9a959; 
            background: rgba(201,169,89,0.1); 
        }
        .tab.active { 
            color: #c9a959; 
            background: rgba(201,169,89,0.15);
            border-bottom-color: #c9a959;
        }
        .tab-emoji { margin-right: 8px; }
        
        /* Map body layout - Remove flex since pager is now horizontal */
        .map-body {
            display: block;
        }
        
        /* Horizontal pager - More visible navigation */
        .pager {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(201,169,89,0.2);
        }
        .pager-dot {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(201, 169, 89, 0.1);
            border: 2px solid rgba(201, 169, 89, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            color: #888;
            font-size: 0.9rem;
        }
        .pager-dot::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(201, 169, 89, 0.4);
            transition: all 0.3s ease;
        }
        .pager-dot:hover {
            background: rgba(201, 169, 89, 0.2);
            border-color: #c9a959;
            color: #c9a959;
            transform: translateY(-2px);
        }
        .pager-dot:hover::before {
            background: #c9a959;
        }
        .pager-dot.active {
            background: rgba(201, 169, 89, 0.3);
            border-color: #c9a959;
            color: #c9a959;
            box-shadow: 0 0 15px rgba(201, 169, 89, 0.4);
        }
        .pager-dot.active::before {
            background: #c9a959;
            box-shadow: 0 0 8px rgba(201, 169, 89, 0.8);
        }
        
        /* Main map area */
        .map-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        
        /* Map layer selector */
        .map-layers {
            display: flex;
            gap: 5px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(201,169,89,0.2);
        }
        .layer-btn {
            padding: 6px 12px;
            font-size: 0.75rem;
            background: rgba(201,169,89,0.1);
            border: 1px solid rgba(201,169,89,0.2);
            color: #888;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .layer-btn:hover {
            color: #c9a959;
            background: rgba(201,169,89,0.2);
        }
        .layer-btn.active {
            color: #c9a959;
            background: rgba(201,169,89,0.3);
            border-color: #c9a959;
        }
        
        #map {
            height: 400px;
            background: #1a1a2e;
        }
        
        /* Loading indicator */
        .map-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20,20,35,0.9);
            color: #c9a959;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
            display: none;
        }
        .map-loading.visible {
            display: block;
        }
        
        /* Step info - Fixed height, elegant design */
        .step-info {
            min-height: 140px;
            max-height: 140px;
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(201,169,89,0.12) 0%, rgba(201,169,89,0.05) 100%);
            border-bottom: 2px solid rgba(201,169,89,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }
        .step-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #c9a959 0%, rgba(201,169,89,0.3) 100%);
        }
        .step-content {
            flex: 1;
            min-width: 0;
            padding-left: 12px;
        }
        .step-title {
            color: #c9a959;
            font-size: 1.3rem;
            margin: 0 0 8px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .step-desc {
            color: #bbb;
            font-size: 0.95rem;
            margin: 0;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .step-duration {
            color: #c9a959;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .step-duration::before {
            content: '⏱️';
            font-size: 1.1rem;
        }
        
        /* Navigation buttons - More prominent */
        .step-nav {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            background: rgba(201,169,89,0.2);
            border: 2px solid rgba(201,169,89,0.4);
            color: #c9a959;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            font-weight: 500;
        }
        .nav-btn:hover:not(:disabled) {
            background: rgba(201,169,89,0.35);
            border-color: #c9a959;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 169, 89, 0.3);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .nav-btn .arrow {
            font-size: 1.2rem;
        }
        
        /* Links */
        .map-links {
            padding: 14px 20px;
            text-align: center;
            border-top: 1px solid rgba(201,169,89,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .map-links a {
            color: #c9a959;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .map-links a:hover { text-decoration: underline; }
        
        /* Mapy.cz logo requirement */
        .mapy-logo {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
        }
        .mapy-logo img {
            height: 24px;
        }
        
        /* Leaflet overrides */
        .leaflet-control-attribution {
            background: rgba(0,0,0,0.7) !important;
            color: #888 !important;
            font-size: 10px;
        }
        .leaflet-control-attribution a { color: #c9a959 !important; }
        .leaflet-control-zoom a {
            background: rgba(20,20,35,0.9) !important;
            color: #c9a959 !important;
            border-color: rgba(201,169,89,0.3) !important;

        /* Custom markers */
        .custom-marker {
            background: transparent;
            border: none;
        }
        .marker-label {
            background: rgba(20,20,35,0.95);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            border: 1px solid rgba(201,169,89,0.4);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .animated-marker {
            width: 16px;
            height: 16px;
            background: #4865df;
            border: 3px solid #e1e2de;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(72,101,223,0.8);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(72,101,223,0.8); }
            50% { box-shadow: 0 0 25px rgba(72,101,223,1); }

            .pager {

            .step-info {

                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 16px 20px;
            }
            .step-title {
                font-size: 1.1rem;
            }
            .step-desc {
                font-size: 0.85rem;
            }
            .step-duration {
                font-size: 0.9rem;
            }
            .nav-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
            .step-nav {
                width: 100%;
                justify-content: center;
            }
            .nav-btn {
                flex: 1;
            }
        }

        }
        
        function setTileLayer(layerName) {
            if (tileLayer) {
                map.removeLayer(tileLayer);
            }

            activeLayer = layerName;

            // Use free maps for these layers, Mapy.cz for outdoor/aerial
            if (['voyager', 'light', 'dark', 'toner', 'cyclosm', 'humanitarian'].includes(layerName) || USE_FREE_TILES) {
                // All free map style options (NO API KEYS NEEDED!)
                const tileUrls = {
                    basic: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
                    outdoor: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                    aerial: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',

                    // CARTO Styles (all free, no API key)
                    voyager: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', // Bright, blue water, clear labels
                    light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',           // Very bright, minimal
                    dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',             // Dark gray, dimmed labels

                    // Stamen Toner via Stadia (free, high-contrast black & white)
                    toner: 'https://tiles.stadiamaps.com/tiles/stamen_toner/{z}/{x}/{y}{r}.png',

                    // OpenStreetMap variants (all free, no API key)
                    cyclosm: 'https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png',      // Cycling/outdoor with terrain
                    humanitarian: 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png'              // Humanitarian OSM with good terrain
                };

                const attributions = {
                    basic: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                    outdoor: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                    aerial: '&copy; Google Maps',
                    voyager: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                    light: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                    dark: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                    toner: '&copy; <a href="https://stadiamaps.com/">Stadia Maps</a> &copy; <a href="https://stamen.com/">Stamen Design</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                    cyclosm: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, rendering: <a href="https://www.cyclosm.org/">CyclOSM</a>',
                    humanitarian: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Tiles courtesy of <a href="https://www.hotosm.org/">Humanitarian OpenStreetMap Team</a>'
                };

                let tileUrl = tileUrls[layerName] || tileUrls.basic;
                if (layerName === 'outdoor' && !USE_FREE_TILES) {
                    tileUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
                }

                tileLayer = L.tileLayer(tileUrl, {
                    attribution: attributions[layerName] || attributions.basic,
                    maxZoom: 20
                }).addTo(map);
            } else {
                // Use Mapy.cz tiles for outdoor and aerial
                tileLayer = L.tileLayer(
                    `https://api.mapy.com/v1/maptiles/${layerName}/256/{z}/{x}/{y}?apikey=${MAPY_API_KEY}`,
                    {
                        attribution: '<a href="https://api.mapy.com/copyright" target="_blank">&copy; Seznam.cz a.s.</a>',
                        maxZoom: 20
                    }
                ).addTo(map);
            }

            // Update button states
            document.querySelectorAll('.layer-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.layer === layerName);
            });
        }
        
        function addMapyLogo() {
            if (!USE_FREE_TILES) {
                const LogoControl = L.Control.extend({
                    options: { position: 'bottomleft' },
                    onAdd: function() {
                        const container = L.DomUtil.create('div', 'mapy-logo');
                        const link = L.DomUtil.create('a', '', container);
                        link.href = 'https://mapy.com/';
                        link.target = '_blank';
                        link.innerHTML = '<img src="https://api.mapy.com/img/api/logo.svg" alt="Mapy.cz" />';
                        L.DomEvent.disableClickPropagation(link);
                        return container;
                    }
                });
                new LogoControl().addTo(map);
            }
        }
        
        // ==============================================
        // EVENT SETUP
        // ==============================================
        
        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    activeTab = tab.dataset.tab;
                    currentStep = 0;
                    showStep(0);
                });
            });
        }
        
        function setupLayers() {
            document.querySelectorAll('.layer-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    setTileLayer(btn.dataset.layer);
                });
            });
        }
        
        // Scroll wheel navigation
        document.querySelector('.map-widget').addEventListener('wheel', (e) => {
            if (!e.ctrlKey) {
                e.preventDefault();
                if (e.deltaY > 0) nextStep();
                else prevStep();
            }
        }, { passive: false });
        
        // ==============================================
        // PAGER
        // ==============================================
        
        function updatePager() {
            const pager = document.getElementById('pager');
            const steps = STEPS[activeTab];

            pager.innerHTML = steps.map((step, i) =>
                `<div class="pager-dot ${i === currentStep ? 'active' : ''}"
                      data-step="${i}">
                    ${step.title}
                 </div>`
            ).join('');

            pager.querySelectorAll('.pager-dot').forEach(dot => {
                dot.addEventListener('click', () => {
                    showStep(parseInt(dot.dataset.step));
                });
            });
        }
        
        // ==============================================
        // STEP DISPLAY
        // ==============================================
        
        async function showStep(index) {
            const steps = STEPS[activeTab];
            if (index < 0 || index >= steps.length) return;
            
            currentStep = index;
            const step = steps[index];
            
            clearLayers();
            
            // Animate map view first
            map.flyTo(step.center, step.zoom, { duration: 0.8 });
            
            // Switch layer AFTER animation completes (if needed)
            if (step.forceLayer && activeLayer !== step.forceLayer) {
                // Wait for flyTo to complete before switching layer
                map.once('moveend', () => {
                    setTileLayer(step.forceLayer);
                });
            }
            
            // Add highlighted areas first (under markers)
            if (step.areas && step.areas.length > 0) {
                step.areas.forEach(areaId => {
                    const area = AREAS[areaId];
                    if (area) addArea(areaId, area);
                });
            }
            
            // Add markers
            step.markers.forEach(locId => {
                const loc = LOCATIONS[locId];
                if (loc) addMarker(loc);
            });
            
            // Add route if needed
            let routeInfo = null;
            if (step.dualRoute) {
                // Special dual route: car shuttle + walking path
                showLoading(true);
                try {
                    await addDualRoutes();
                } catch (e) {
                    console.warn('Dual route loading failed:', e);
                } finally {
                    showLoading(false);
                }
            } else if (step.route) {
                showLoading(true);
                try {
                    routeInfo = await addRoute(step.route);
                } catch (e) {
                    console.warn('Route loading failed:', e);
                } finally {
                    showLoading(false);
                }
            }
            
            // Update UI
            updatePager();
            updateStepInfo(step, routeInfo);
            updateLinks();
        }
        
        // ==============================================
        // AREAS (HIGHLIGHTS)
        // ==============================================
        
        function addArea(areaId, area) {
            // Draw polygon
            const polygon = L.polygon(area.coords, {
                color: area.color,
                fillColor: area.fillColor,
                fillOpacity: 0.4,
                weight: 3
            }).addTo(map);
            layers.push(polygon);
            
            // Add label for area using the area name (replace underscore with space)
            const center = polygon.getBounds().getCenter();
            const labelName = areaId.replace(/_/g, ' ');
            const labelIcon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="marker-label" style="background: ${area.color}; border-color: ${area.color}; font-weight: bold;">${labelName}</div>`,
                iconSize: [100, 30],
                iconAnchor: [50, 15]
            });
            const labelMarker = L.marker(center, { icon: labelIcon }).addTo(map);
            layers.push(labelMarker);
        }
        
        // ==============================================
        // MARKERS
        // ==============================================
        
        function addMarker(loc) {
            const icon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="marker-label">${loc.icon} ${loc.name}</div>`,
                iconSize: [120, 35],
                iconAnchor: [60, 17]
            });
            
            const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
            layers.push(marker);
        }
        
        // ==============================================
        // ROUTING
        // ==============================================
        
        async function addRoute(routeConfig) {
            const fromLoc = LOCATIONS[routeConfig.from];
            const toLoc = LOCATIONS[routeConfig.to];
            const routeType = routeConfig.type;
            const cacheKey = `${routeConfig.from}_${routeConfig.to}_${routeType}`;
            
            // Check cache first
            if (routeCache[cacheKey]) {
                displayRoute(routeCache[cacheKey], routeType);
                return routeCache[cacheKey];
            }
            
            // Special handling for train routes (no car routing)
            if (routeType === 'train_line') {
                const fallback = getFallbackRoute(routeConfig);
                if (fallback) {
                    displayRoute(fallback, routeType);
                    routeCache[cacheKey] = fallback;
                    return fallback;
                }
            }
            
            // Try Mapy.cz API for routing with timeout
            if (!USE_FREE_TILES) {
                try {
                    const url = new URL('https://api.mapy.com/v1/routing/route');
                    url.searchParams.set('apikey', MAPY_API_KEY);
                    url.searchParams.set('start', `${fromLoc.lng},${fromLoc.lat}`);
                    url.searchParams.set('end', `${toLoc.lng},${toLoc.lat}`);
                    url.searchParams.set('routeType', routeType === 'train_line' ? 'car_fast' : routeType);
                    url.searchParams.set('format', 'geojson');
                    url.searchParams.set('lang', 'cs');
                    
                    // Add timeout to prevent hanging
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);
                    
                    const response = await fetch(url.toString(), { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        const routeData = {
                            geometry: data.geometry,
                            length: data.length,
                            duration: data.duration
                        };
                        
                        displayRouteGeoJSON(data.geometry, routeType);
                        routeCache[cacheKey] = routeData;
                        return routeData;
                    }
                } catch (e) {
                    console.warn('Mapy.cz routing failed:', e);
                }
            }
            
            // Use fallback
            const fallback = getFallbackRoute(routeConfig);
            if (fallback) {
                displayRoute(fallback, routeType);
                routeCache[cacheKey] = fallback;
                return fallback;
            }
            
            return null;
        }
        
        function getFallbackRoute(routeConfig) {
            const key = `${routeConfig.from}_${routeConfig.to}`;
            const typeRoutes = FALLBACK_ROUTES[routeConfig.type];
            if (typeRoutes && typeRoutes[key]) {
                return typeRoutes[key];
            }
            
            // Generic fallback - straight line
            const fromLoc = LOCATIONS[routeConfig.from];
            const toLoc = LOCATIONS[routeConfig.to];
            return {
                coords: [[fromLoc.lat, fromLoc.lng], [toLoc.lat, toLoc.lng]],
                length: calculateDistance(fromLoc, toLoc),
                duration: Math.round(calculateDistance(fromLoc, toLoc) / 15) // ~15m/s for car
            };
        }
        
        function displayRoute(routeData, routeType) {
            // White border (drawn first, underneath)
            const borderPolyline = L.polyline(routeData.coords, {
                color: ROUTE_BORDER_COLOR,
                weight: 8,
                opacity: 1
            }).addTo(map);
            layers.push(borderPolyline);
            
            // Blue main line
            const polyline = L.polyline(routeData.coords, {
                color: ROUTE_COLOR,
                weight: 5,
                opacity: 1
            }).addTo(map);
            layers.push(polyline);
            
            animateRoute(routeData.coords);
        }
        
        function displayRouteGeoJSON(geojson, routeType) {
            // White border (drawn first, underneath)
            const borderLayer = L.geoJSON(geojson, {
                style: {
                    color: ROUTE_BORDER_COLOR,
                    weight: 8,
                    opacity: 1
                }
            }).addTo(map);
            layers.push(borderLayer);
            
            // Blue main line
            const routeLayer = L.geoJSON(geojson, {
                style: {
                    color: ROUTE_COLOR,
                    weight: 5,
                    opacity: 1
                }
            }).addTo(map);
            layers.push(routeLayer);
            
            // Extract coordinates for animation
            const coords = geojson.geometry.coordinates.map(c => [c[1], c[0]]);
            // Sample every 10th point for animation
            const sampledCoords = coords.filter((_, i) => i % 10 === 0 || i === coords.length - 1);
            animateRoute(sampledCoords.length > 2 ? sampledCoords : coords);
        }
        
        function animateRoute(coords) {
            if (animationTimer) clearInterval(animationTimer);
            
            const icon = L.divIcon({
                className: 'animated-marker',
                iconSize: [22, 22],
                iconAnchor: [11, 11]
            });
            
            const marker = L.marker(coords[0], { icon, zIndexOffset: 1000 }).addTo(map);
            layers.push(marker);
            
            let idx = 0;
            animationTimer = setInterval(() => {
                idx = (idx + 1) % coords.length;
                marker.setLatLng(coords[idx]);
            }, 400);
        }
        
        // Dual routes for Bohutice -> Venue
        async function addDualRoutes() {
            const bohutice = LOCATIONS.bohutice;
            const venue = LOCATIONS.venue;
            
            // 1. Car shuttle route (blue) - using car_fast
            try {
                const carUrl = new URL('https://api.mapy.com/v1/routing/route');
                carUrl.searchParams.set('apikey', MAPY_API_KEY);
                carUrl.searchParams.set('start', `${bohutice.lng},${bohutice.lat}`);
                carUrl.searchParams.set('end', `${venue.lng},${venue.lat}`);
                carUrl.searchParams.set('routeType', 'car_fast');
                carUrl.searchParams.set('format', 'geojson');
                
                const controller1 = new AbortController();
                setTimeout(() => controller1.abort(), 5000);
                const carResponse = await fetch(carUrl.toString(), { signal: controller1.signal });
                
                if (carResponse.ok) {
                    const carData = await carResponse.json();
                    // Blue route with white border
                    const carBorder = L.geoJSON(carData.geometry, {
                        style: { color: '#e1e2de', weight: 8, opacity: 1 }
                    }).addTo(map);
                    layers.push(carBorder);
                    const carRoute = L.geoJSON(carData.geometry, {
                        style: { color: SHUTTLE_COLOR, weight: 5, opacity: 1 }
                    }).addTo(map);
                    layers.push(carRoute);
                }
            } catch (e) {
                // Fallback: straight line for car
                const carFallback = L.polyline([[bohutice.lat, bohutice.lng], [venue.lat, venue.lng]], {
                    color: SHUTTLE_COLOR, weight: 5, opacity: 0.8, dashArray: '10, 10'
                }).addTo(map);
                layers.push(carFallback);
            }
            
            // 2. Walking route (red tourist path) - using foot_fast
            try {
                const walkUrl = new URL('https://api.mapy.com/v1/routing/route');
                walkUrl.searchParams.set('apikey', MAPY_API_KEY);
                walkUrl.searchParams.set('start', `${bohutice.lng},${bohutice.lat}`);
                walkUrl.searchParams.set('end', `${venue.lng},${venue.lat}`);
                walkUrl.searchParams.set('routeType', 'foot_fast');
                walkUrl.searchParams.set('format', 'geojson');
                
                const controller2 = new AbortController();
                setTimeout(() => controller2.abort(), 5000);
                const walkResponse = await fetch(walkUrl.toString(), { signal: controller2.signal });
                
                if (walkResponse.ok) {
                    const walkData = await walkResponse.json();
                    // Red route with white border
                    const walkBorder = L.geoJSON(walkData.geometry, {
                        style: { color: '#e1e2de', weight: 8, opacity: 1 }
                    }).addTo(map);
                    layers.push(walkBorder);
                    const walkRoute = L.geoJSON(walkData.geometry, {
                        style: { color: WALK_COLOR, weight: 5, opacity: 1 }
                    }).addTo(map);
                    layers.push(walkRoute);
                }
            } catch (e) {
                // Fallback: dotted red line
                const walkFallback = L.polyline([[bohutice.lat, bohutice.lng], [venue.lat, venue.lng]], {
                    color: WALK_COLOR, weight: 4, opacity: 0.8, dashArray: '5, 10'
                }).addTo(map);
                layers.push(walkFallback);
            }
            
            // Add route legend markers - Převozník (blue) on top, Pešky (red) below
            const carIcon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="marker-label" style="background: ${SHUTTLE_COLOR}; border-color: ${SHUTTLE_COLOR};">🚐 Převozník</div>`,
                iconSize: [120, 30],
                iconAnchor: [60, 15]  // Top label
            });
            const carMarker = L.marker([48.983, 16.340], { icon: carIcon }).addTo(map);
            layers.push(carMarker);

            const walkIcon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="marker-label" style="background: ${WALK_COLOR}; border-color: ${WALK_COLOR};">🥾 Pěšky</div>`,
                iconSize: [100, 30],
                iconAnchor: [50, 45]  // Bottom label
            });
            const walkMarker = L.marker([48.983, 16.340], { icon: walkIcon }).addTo(map);
            layers.push(walkMarker);
        }
        
        function calculateDistance(loc1, loc2) {
            const R = 6371000; // Earth radius in meters
            const lat1 = loc1.lat * Math.PI / 180;
            const lat2 = loc2.lat * Math.PI / 180;
            const dLat = (loc2.lat - loc1.lat) * Math.PI / 180;
            const dLon = (loc2.lng - loc1.lng) * Math.PI / 180;
            
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1) * Math.cos(lat2) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }
        
        // ==============================================
        // UI UPDATES
        // ==============================================
        
        function clearLayers() {
            if (animationTimer) {
                clearInterval(animationTimer);
                animationTimer = null;
            }
            layers.forEach(layer => {
                if (map.hasLayer(layer)) map.removeLayer(layer);
            });
            layers = [];
        }
        
        function showLoading(visible) {
            const el = document.getElementById('mapLoading');
            if (el) el.classList.toggle('visible', visible);
        }
        
        function updateStepInfo(step, routeInfo) {
            const steps = STEPS[activeTab];
            const info = document.getElementById('stepInfo');
            
            let durationText = '';
            if (routeInfo) {
                const km = (routeInfo.length / 1000).toFixed(1);
                const min = Math.round(routeInfo.duration / 60);
                durationText = `<p class="step-duration">~${min} min (${km} km)</p>`;
            }
            
            // Special dual route description
            let descContent = `<p class="step-desc">${step.desc}</p>`;
            if (step.dualRoute) {
                descContent = `
                    <p class="step-desc" style="margin-bottom: 8px;">
                        <span style="color: ${SHUTTLE_COLOR}; font-weight: bold;">🚐 Kyvadlová doprava</span> – odvezeme vás autem (~5 min)
                    </p>
                    <p class="step-desc">
                        <span style="color: ${WALK_COLOR}; font-weight: bold;">🥾 Pěšky po červené</span> – turistická stezka (~45 min, 3.5 km)
                    </p>
                `;
            }
            
            info.innerHTML = `
                <div class="step-content">
                    <h3 class="step-title">${step.title}</h3>
                    ${descContent}
                    ${durationText}
                </div>
                <div class="step-nav">
                    <button class="nav-btn" onclick="prevStep()" ${currentStep === 0 ? 'disabled' : ''}>
                        <span class="arrow">←</span> Zpět
                    </button>
                    <button class="nav-btn" onclick="nextStep()" ${currentStep === steps.length - 1 ? 'disabled' : ''}>
                        Další <span class="arrow">→</span>
                    </button>
                </div>
            `;
        }
        
        function updateLinks() {
            const links = document.getElementById('mapLinks');
            const { church, venue, brnoStation, bohutice } = LOCATIONS;
            
            if (activeTab === 'car') {
                links.innerHTML = `
                    <a href="https://mapy.com/fnc/v1/route?start=${church.lng},${church.lat}&end=${venue.lng},${venue.lat}&routeType=car_fast" target="_blank">
                        📍 Navigace v Mapy.cz
                    </a>
                    <a href="https://www.google.com/maps/dir/${church.lat},${church.lng}/${venue.lat},${venue.lng}" target="_blank">
                        🗺️ Google Maps
                    </a>
                `;
            } else {
                links.innerHTML = `
                    <a href="https://idos.cz/vlakyautobusymhdvse/spojeni/vysledky/?date=19.09.2026&time=12:00&f=Brno&fc=1&t=Bohutice&tc=1&cmd=cmdSearch" target="_blank">
                        🎫 Jízdní řády IDOS
                    </a>
                    <a href="https://mapy.com/fnc/v1/route?start=${brnoStation.lng},${brnoStation.lat}&end=${bohutice.lng},${bohutice.lat}" target="_blank">
                        📍 Mapa trasy
                    </a>
                `;
            }
        }
        
        // ==============================================
        // NAVIGATION
        // ==============================================
        
        function prevStep() {
            if (currentStep > 0) showStep(currentStep - 1);
        }
        
        function nextStep() {
            const steps = STEPS[activeTab];
            if (currentStep < steps.length - 1) showStep(currentStep + 1);
        }

        // ==============================================
        // START
        // ==============================================

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
